{% extends "base.html" %}
{% block content %}

<div class="success-container">
    <div class="success-card">
        <!-- Visual Success Anchor Animation -->
        <div class="success-icon-wrapper">
            <div class="success-icon-circle">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="feather feather-check">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <!-- Animated background pulse rings -->
            <div class="pulse-ring ring-1"></div>
            <div class="pulse-ring ring-2"></div>
        </div>

        <!-- Keep your exact H1 tag structured beautifully inside the layout -->
        <h1 class="success-title">Thank you for booking.</h1>
        
        <p class="success-subtitle">Your reservation has been locked in and confirmed. A verification receipt with itinerary specifics is on its way to your inbox.</p>

        <!-- Premium Metadata Interface Card -->
        <div class="itinerary-preview">
            <div class="preview-row">
                <span class="preview-label">Status</span>
                <span class="preview-badge">Confirmed</span>
            </div>
            <div class="preview-row">
                <span class="preview-label">Reservation Class</span>
                <span class="preview-value">Premium All-Inclusive</span>
            </div>
        </div>

        <!-- Navigation Call-To-Action Framework -->
        <div class="action-group">
            <a href="/" class="btn-primary">
                <span>Return to Dashboard</span>
            </a>
            <button onclick="window.print()" class="btn-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                <span>Print Invoice</span>
            </button>
        </div>
    </div>
</div>

<style>
    /* Design tokens synchronized directly with your premium setup */
    :root {
        --success-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
        --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --bg-card: #ffffff;
        --border-color: #f3f4f6;
        --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }

    /* Core Flex Placement Layer */
    .success-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 75vh;
        padding: 2.5rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #fafafa;
    }

    /* Card Frame Assembly */
    .success-card {
        background: var(--bg-card);
        width: 100%;
        max-width: 480px;
        border-radius: 32px;
        box-shadow: var(--shadow-lg);
        border: 1px solid rgba(0, 0, 0, 0.03);
        padding: 3rem 2.5rem;
        text-align: center;
        box-sizing: border-box;
        animation: cardFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Animated Checkmark Architecture */
    .success-icon-wrapper {
        position: relative;
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem auto;
    }

    .success-icon-circle {
        position: relative;
        z-index: 3;
        width: 100%;
        height: 100%;
        background: var(--success-gradient);
        color: #ffffff;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        animation: iconScaleUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Micro-interaction Radar Rings */
    .pulse-ring {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: #10b981;
        opacity: 0.15;
        z-index: 1;
    }

    .ring-1 { animation: pulseRadial 2s infinite ease-out; }
    .ring-2 { animation: pulseRadial 2s infinite ease-out 0.6s; }

    /* Custom Header Typography Overwrite */
    .success-title {
        font-size: 1.85rem;
        font-weight: 800;
        color: var(--text-main);
        margin: 0 0 0.75rem 0;
        letter-spacing: -0.03em;
    }

    .success-subtitle {
        font-size: 0.95rem;
        color: var(--text-muted);
        line-height: 1.6;
        margin: 0 0 2rem 0;
    }

    /* Summary Dashboard Block */
    .itinerary-preview {
        background: #f9fafb;
        border: 1px solid var(--border-color);
        border-radius: 18px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 2.5rem;
    }

    .preview-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 0;
    }

    .preview-row:not(:last-child) {
        border-bottom: 1px solid #f1f3f5;
    }

    .preview-label {
        font-size: 0.9rem;
        color: var(--text-muted);
        font-weight: 500;
    }

    .preview-value {
        font-size: 0.9rem;
        color: var(--text-main);
        font-weight: 600;
    }

    .preview-badge {
        background-color: #d1fae5;
        color: #065f46;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }

    /* Interface Action Alignment Layers */
    .action-group {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
    }

    .btn-primary {
        background: var(--primary-gradient);
        color: #ffffff;
        text-decoration: none;
        padding: 1rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: 14px;
        display: block;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
    }

    .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
    }

    .btn-secondary {
        background: transparent;
        color: #4b5563;
        border: 1px solid #e5e7eb;
        padding: 0.9rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: 14px;
        cursor: pointer;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.2s ease;
    }

    .btn-secondary:hover {
        background-color: #f9fafb;
        color: var(--text-main);
        border-color: #d1d5db;
    }

    /* Hardware Accelerated Modern CSS Motion Triggers */
    @keyframes cardFadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes iconScaleUp {
        from { transform: scale(0.5); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    @keyframes pulseRadial {
        0% { transform: scale(1); opacity: 0.2; }
        100% { transform: scale(1.4); opacity: 0; }
    }
</style>
{% endblock content %}
